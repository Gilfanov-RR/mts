version: "3.8"

services:
  backend:
    build: ../backend
    container_name: hack-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../backend:/app
    depends_on:
      - db
      - chroma

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: hack-frontend
    ports:
      - "5173:5173"
    # Монтируем ТОЛЬКО исходники, а не весь проект
    volumes:
      - ../frontend/src:/app/src:delegated
      - ../frontend/public:/app/public:delegated
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host"]

  db:
    image: postgres:15-alpine
    container_name: hack-postgres
    environment:
      POSTGRES_DB: hack
      POSTGRES_USER: hack
      POSTGRES_PASSWORD: hack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  chroma:
    image: chromadb/chroma:latest
    container_name: hack-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma

volumes:
  pgdata:
  chroma-data:
